# Drop-in for nginx.service — installed to /etc/systemd/system/nginx.service.d/
# Delays nginx startup until the backend socket is ready.
# This file is identical between the Docker container and the embedded target.

[Unit]
After=beast-backend.service
Requires=beast-backend.service

[Service]
ExecStartPre=/bin/sh -c 'until [ -S /tmp/backend.sock ]; do sleep 0.1; done'
