# Embedded-target nginx config (mncos / msys layout).
#
# Identical to nginx/nginx.conf except for paths: config + static site live under
# /opt/monutchee/msys/conf/webserver, TLS under /opt/monutchee/msys/runtime/
# webserver/ssl. Volatile state the device shouldn't wear flash for (pid, temp,
# socket) stays on tmpfs (/tmp). The C++ backend (NginxController) starts this as
# the unprivileged `worker` user — pointed here via WEBENGINE_CONFIG /
# WEBENGINE_LISTEN_FILE in beast-backend.service; CAP_NET_BIND_SERVICE on that
# unit (inherited by the spawned nginx) lets it bind 80/443.
#
# Installed by meta-mncos to /opt/monutchee/msys/conf/webserver/nginx.conf.

# Runs as an unprivileged user (no `user` directive: when the master is not root
# it simply runs workers as itself). This lets the same-user C++ backend control
# nginx — reload/quit signal the master — and matches the Docker config.
worker_processes auto;
pid /tmp/nginx.pid;                 # tmpfs — writable by the service user, no flash wear
error_log stderr warn;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;   # shipped by the nginx package
    default_type application/octet-stream;

    # Access logging disabled (was flooding the container console).
    access_log off;
    sendfile   on;
    keepalive_timeout 65;

    # Temp paths on tmpfs so the unprivileged master can write them without flash
    # wear; the C++ NginxController creates these dirs before starting nginx.
    client_body_temp_path /tmp/nginx/client_body;
    proxy_temp_path       /tmp/nginx/proxy;
    fastcgi_temp_path     /tmp/nginx/fastcgi;
    uwsgi_temp_path       /tmp/nginx/uwsgi;
    scgi_temp_path        /tmp/nginx/scgi;

    # Upstream: C++ backend over Unix Domain Socket.
    # Both nginx workers and the backend run as `worker`, so /tmp/backend.sock
    # (mode 0600) is accessible to both.
    upstream beast_backend {
        server unix:/tmp/backend.sock;
    }

    server {
        # Listen ports live in a generated snippet so the C++ NginxController can
        # change them at runtime (rewrite snippet -> nginx -t -> nginx -s reload).
        include /opt/monutchee/msys/conf/webserver/listen.conf;
        server_name _;

        ssl_certificate     /opt/monutchee/msys/runtime/webserver/ssl/server.crt;
        ssl_certificate_key /opt/monutchee/msys/runtime/webserver/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        root  /opt/monutchee/msys/conf/webserver/www;
        index index.html;

        # ── Protected area ────────────────────────────────────────────────────
        # auth_request fires a sub-request to /auth-check before serving the
        # file. 200 → proceed; 401 → redirect to login; 403 → deny.
        location /protected/ {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            error_page 403 = @forbidden;
            try_files $uri $uri/ =404;
        }

        # ── Internal auth sub-request ─────────────────────────────────────────
        # Only reachable from auth_request, not from the outside.
        location = /auth-check {
            internal;
            proxy_pass              http://beast_backend;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length  "";
            proxy_set_header        X-Original-URI  $request_uri;
            proxy_set_header        Cookie          $http_cookie;
        }

        # ── API proxy ─────────────────────────────────────────────────────────
        # HTTP/1.1 + empty Connection header keeps upstream connections alive.
        # The Upgrade/Connection map below is inert for REST but enables
        # WebSocket without any config change when that protocol is chosen.
        location /api/ {
            proxy_pass         http://beast_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_read_timeout 300s;
        }

        # ── Frontend static files ─────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        location @login_redirect {
            return 302 /?reason=unauthenticated;
        }
        location @forbidden {
            return 403 "Access denied";
        }
    }

    # Required for WebSocket Upgrade header passthrough.
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ""       close;
    }
}
