info:
  name: Auth/Login
  type: http
  seq: 1

http:
  method: POST
  url: https://{{ipAddr}}:{{port}}/api/login
  body:
    type: json
    data: |-
      {
          "username": "{{login_username}}"
          "password": "{{login_passwd}}"
      }

runtime:
  variables:
    - name: login_username
      value: admin
    - name: login_passwd
      value: admin123
    - name: login_username
      value: alice
      disabled: true
    - name: login_passwd
      value: user123
      disabled: true
    - name: login_username
      value: viewer
      disabled: true
    - name: login_passwd
      value: viewer123
      disabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
