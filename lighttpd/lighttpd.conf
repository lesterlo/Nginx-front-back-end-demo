# Minimal lighttpd config for the webengine PoC, mirroring the nginx setup:
#   • public static files served from /www
#   • /api/ and /protected/ reverse-proxied to the C++ backend over a Unix socket
#     (the backend gates + serves /protected/ since lighttpd has no auth_request)
#   • TLS on a separate port (see the generated listen snippet)
#
# Runs as an unprivileged user: no server.username/server.groupname (those only
# take effect when lighttpd is started as root). Running as the same service user
# as the C++ backend lets the backend control lighttpd — off()/restart signal the
# master — without root or extra capabilities.

server.modules = (
    "mod_proxy",      # reverse proxy for /api/ and /protected/
    "mod_openssl",    # TLS (see the $SERVER["socket"] block in the listen snippet)
)

server.document-root = "/www"
server.pid-file      = "/tmp/lighttpd.pid"   # must match LighttpdController Options::pidfile
server.errorlog      = "/dev/stderr"
index-file.names     = ( "index.html" )

# Content types for the files lighttpd serves statically. Without this, lighttpd
# labels every static file "application/octet-stream", so browsers DOWNLOAD pages
# (e.g. index.html) instead of rendering them. (nginx gets this from `include
# mime.types`; lighttpd needs it spelled out.) The "" entry is the default for
# any unlisted extension.
mimetype.assign = (
    ".html" => "text/html",
    ".htm"  => "text/html",
    ".txt"  => "text/plain",
    ".css"  => "text/css",
    ".js"   => "application/javascript",
    ".json" => "application/json",
    ".svg"  => "image/svg+xml",
    ".png"  => "image/png",
    ".jpg"  => "image/jpeg",
    ".jpeg" => "image/jpeg",
    ".gif"  => "image/gif",
    ".ico"  => "image/x-icon",
    ".woff" => "font/woff",
    ".woff2"=> "font/woff2",
    ".webp" => "image/webp",
    ".map"  => "application/json",
    ""      => "application/octet-stream"
)

# Upload/temp dir, writable by the unprivileged service user.
server.upload-dirs   = ( "/tmp/lighttpd" )

# Listen ports (server.port + the TLS $SERVER["socket"] block) live in a generated
# snippet so the C++ LighttpdController can change them at runtime
# (rewrite snippet -> lighttpd -tt -> restart). Do not edit conf.d/listen.conf by hand.
include "/etc/lighttpd/conf.d/listen.conf"

# ── Reverse proxy → C++ backend over the Unix domain socket ───────────────────
# Both /api/ and /protected/ go to the backend:
#   • /api/        — the JSON API.
#   • /protected/  — gated static files. lighttpd has no native auth_request, so
#                    rather than serving these itself it lets the backend gate AND
#                    serve them (WebEngine::serve_protected_files), reusing the same
#                    session token + ACL as /auth-check. Public static files (/, css,
#                    …) are still served directly by lighttpd from document-root.
# Both lighttpd and the backend run as the same service user, so the 0600 socket
# at /tmp/backend.sock is shared. Unix-socket proxying needs lighttpd >= 1.4.46;
# on a genuinely old target whose lighttpd predates that, point the proxy at a TCP
# backend instead (and have the backend listen on TCP) — see README.
$HTTP["url"] =~ "^/(api|protected)/" {
    proxy.server = ( "" => ( ( "socket" => "/tmp/backend.sock" ) ) )
}
