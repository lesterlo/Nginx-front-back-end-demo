# Generated/owned by the C++ LighttpdController (webengine::LighttpdController).
# Do not edit by hand — set_listen_port()/set_listen_ports() rewrite this file,
# then validate (lighttpd -tt) and apply it (restart — lighttpd has no graceful
# config reload on the targeted platforms).
#
# High ports (>=1024) so lighttpd can bind them as the unprivileged service user.
server.port = 8080
$SERVER["socket"] == "0.0.0.0:8443" {
    ssl.engine  = "enable"
    ssl.pemfile = "/etc/lighttpd/ssl/server.pem"
}
