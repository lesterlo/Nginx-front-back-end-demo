<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nginx + Beast PoC</title>
  <style>
    body { font-family: sans-serif; max-width: 360px; margin: 100px auto; padding: 0 20px; }
    h1   { font-size: 1.3rem; margin-bottom: 1.5rem; }
    input {
      display: block; width: 100%; margin: 8px 0;
      padding: 8px 10px; box-sizing: border-box;
      border: 1px solid #ccc; border-radius: 4px;
    }
    button {
      margin-top: 12px; padding: 8px 20px;
      background: #0066cc; color: #fff;
      border: none; border-radius: 4px; cursor: pointer;
    }
    #error { color: #c00; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <h1>Nginx + Beast PoC</h1>
  <form id="login-form">
    <input type="text"     id="username" placeholder="Username" autocomplete="username" required>
    <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
    <button type="submit">Login</button>
    <div id="error">Invalid credentials. Try again.</div>
  </form>

  <script>
    // Show the unauthenticated reason banner if redirected here from /protected/.
    if (new URLSearchParams(location.search).get('reason') === 'unauthenticated') {
      const err = document.getElementById('error');
      err.textContent = 'Session expired or not logged in.';
      err.style.display = 'block';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('error');
      err.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          window.location.href = '/protected/dashboard.html';
        } else {
          err.textContent = 'Invalid credentials. Try again.';
          err.style.display = 'block';
        }
      } catch {
        err.textContent = 'Network error. Is the server running?';
        err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
